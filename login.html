<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - CasaApp</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav>
    <div>
        <a href="index.html">🏠 Inicio</a>
        <a href="tareas.html">📋 Tareas</a>
        <a href="gastos.html">💰 Gastos</a>
        <a href="compras.html">🛒 Compras</a>
    </div>
    <a href="login.html" class="btn-login">👤 Iniciar Sesión</a>
</nav>
    
    <header>
        <h1>👤 Acceso de Usuarios</h1>
        <p>Entra para gestionar tu hogar</p>
    </header>
    
    <main>
        <div class="login-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: #2c3e50;">Iniciar Sesión</h2>
            
            <!-- Aquí empieza el formulario -->
            <form action="#" method="POST">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn-submit">Entrar en CasaApp</button>
                
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #6c757d;">
                    ¿No tienes cuenta? <a href="register.html" style="color: #667eea; font-weight: bold;">Regístrate aquí</a>
                </p>
            </form>
        </div>
    </main>
    
    <footer>
        <p>Desarrollado por LZumake | Proyecto DAW</p>
    </footer>
</body>
</html>
