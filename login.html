<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Ksap</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body class="login-page">
    
    <main class="login-container">
        <div class="login-box">
            <!-- Logo y título -->
            <div class="login-header">
                <h1>🏠 Ksap</h1>
                <p>Gestiona tu casa compartida</p>
            </div>

            <!-- Formulario de login -->
            <form id="login-form" class="login-form">
                <div class="form-group">
                    <label for="username">Usuario</label>
                    <input type="text" id="username" name="username" required placeholder="Introduce tu usuario">
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Introduce tu contraseña">
                </div>

                <button type="submit" class="btn-primary btn-login-submit">Iniciar Sesión</button>
            </form>

            <!-- Separador -->
            <div class="login-divider">
                <span>o</span>
            </div>

            <!-- Botón de invitado -->
            <button id="guest-login" class="btn-guest">
                👤 Entrar como invitado
            </button>

            <!-- Enlace a registro -->
            <p class="login-footer">
                ¿No tienes cuenta? <a href="register.html">Regístrate</a>
            </p>
        </div>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
