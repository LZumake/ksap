<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Ksap</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <nav>
    <div>
        <a href="index.html">🏠 Inicio</a>
        <a href="tareas.html">📋 Tareas</a>
        <a href="gastos.html">💰 Gastos</a>
        <a href="compras.html">🛒 Compras</a>
    </div>
    <a href="login.html" class="btn-login">👤 Iniciar Sesión</a>
</nav>
    
    <header>
        <h1>👤 Crear Cuenta</h1>
        <p>Únete a la gestión de tu hogar</p>
    </header>
    
    <main>
        <div class="login-container">
            <h2 style="text-align: center; margin-bottom: 1.5rem; color: #2c3e50;">Registrarse</h2>
            
            <form id="register-form" novalidate>
                <!-- Campo: Nombre -->
                <div class="form-group">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" class="form-control" placeholder="Ej: Rosa García" required>
<span class="error-message" id="error-nombre"></span>
                </div>
                
                <!-- Campo: Email -->
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                   <input type="email" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
<span class="error-message" id="error-email"></span>
                </div>
                
                <!-- Campo: Contraseña -->
                <div class="form-group">
                    <label for="password">Contraseña</label>
                   <input type="password" id="password" class="form-control" placeholder="Mínimo 8 caracteres" required minlength="8">
<span class="error-message" id="error-password"></span>
                    <span class="password-hint">Usa mayúsculas, números y símbolos para mayor seguridad.</span>
                </div>
                
                <!-- Campo: Confirmar contraseña -->
                <div class="form-group">
                    <label for="password2">Confirmar contraseña</label>
                  <input type="password" id="password2" class="form-control" placeholder="Repite la contraseña" required>
<span class="error-message" id="error-password2"></span>
                </div>
                
                <!-- Checkbox de términos -->
                <div class="terms-checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">Acepto los <a href="#">términos y condiciones</a></label>
                </div>
                
                <button type="submit" class="btn-submit">Crear mi cuenta</button>
                
                <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #6c757d;">
                    ¿Ya tienes cuenta? <a href="login.html" style="color: #667eea; font-weight: bold;">Inicia sesión aquí</a>
                </p>
            </form>
        </div>
    </main>
    
    <footer>
        <p>Desarrollado por LZumake | Proyecto DAW</p>
</footer>

<script src="js/app.js"></script>  <!-- ← AÑADE ESTA LÍNEA -->
</body>
</html>
